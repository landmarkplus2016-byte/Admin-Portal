<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses — HR Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">HR Admin Portal</div>
      <nav>
        <a href="../index.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"></path><path d="M5 10v10h14V10"></path><path d="M9 20v-6h6v6"></path></svg>
          <span data-i18n="nav.dashboard">Dashboard</span>
        </a>
        <a href="settlements.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13"></path><path d="M8 12h13"></path><path d="M8 18h13"></path><path d="M3 6h.01"></path><path d="M3 12h.01"></path><path d="M3 18h.01"></path></svg>
          <span data-i18n="nav.settlements">Settlements</span>
        </a>
        <a href="expenses.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h9l3 3v17l-3-2-3 2-3-2-3 2V2Z"></path><path d="M9 8h6"></path><path d="M9 12h6"></path><path d="M9 16h4"></path></svg>
          <span data-i18n="nav.expenses">Expenses</span>
        </a>
        <a href="invoices.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"></path><path d="M14 2v6h6"></path><path d="M9 13h6"></path><path d="M9 17h6"></path></svg>
          <span data-i18n="nav.invoices">Invoices &amp; Dues</span>
        </a>
        <a href="allowances.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="1"></rect><path d="M12 8v13"></path><path d="M3 12h18"></path><path d="M7.5 8a2.5 2.5 0 0 1 0-5C10 3 12 8 12 8s2-5 4.5-5a2.5 2.5 0 0 1 0 5"></path></svg>
          <span data-i18n="nav.allowances">Allowances</span>
        </a>
        <a href="settings.html" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path></svg>
          <span data-i18n="nav.settings">Settings</span>
        </a>
      </nav>
    </aside>
    <div class="main">
      <div class="topbar">
        <div class="page-title" data-i18n="expenses.title">Expenses</div>
        <button type="button" class="btn-secondary lang-toggle-btn" id="lang-toggle-btn">العربية</button>
      </div>
      <div class="content">
        <div class="filter-bar">
          <input type="text" id="search-input" class="search-input" data-i18n-placeholder="expenses.searchPlaceholder" placeholder="Search by name, site ID, or notes...">
          <select id="department-filter" class="filter-select">
            <option value="" data-i18n="expenses.allDepartments">All Departments</option>
          </select>
          <select id="approval-filter" class="filter-select">
            <option value="" data-i18n="expenses.allApproval">All Approval</option>
            <option value="Approved" data-i18n="status.Approved">Approved</option>
            <option value="Hold" data-i18n="status.Hold">Hold</option>
            <option value="Canceled" data-i18n="status.Canceled">Canceled</option>
          </select>
          <select id="payment-filter" class="filter-select">
            <option value="" data-i18n="expenses.allPayment">All Payment</option>
            <option value="transfer" data-i18n="payment.transfer">Transfer</option>
            <option value="cash" data-i18n="payment.cash">Cash</option>
          </select>
          <button type="button" class="btn-primary" id="add-expense-btn" data-i18n="expenses.addButton">Add Expense</button>
        </div>
        <div class="table-meta-row">
          <div class="record-count" id="record-count"></div>
        </div>
        <div class="table-wrapper">
          <table id="expenses-table">
            <thead>
              <tr>
                <th data-field="name" data-i18n="common.field.name">Name</th>
                <th data-field="siteId" data-i18n="common.field.siteId">Site ID</th>
                <th data-field="value" data-i18n="common.field.value">Value</th>
                <th data-field="receivedDate" data-i18n="common.field.receivedDate">Received Date</th>
                <th data-field="financeDate" data-i18n="common.field.financeDate">Finance Date</th>
                <th data-field="paymentMethod" data-i18n="common.field.paymentMethod">Payment</th>
                <th data-field="approval" data-i18n="common.field.approval">Approval</th>
                <th data-field="manager" data-i18n="common.field.manager">Manager</th>
                <th data-field="department" data-i18n="common.field.department">Department</th>
                <th data-field="notes" data-i18n="common.field.notes">Notes</th>
              </tr>
            </thead>
            <tbody id="expenses-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-container"></div>
  <div id="toast-container"></div>

  <script src="../js/data.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../app.js"></script>
  <script src="../js/expenses.js"></script>
</body>
</html>
